<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cade Cain</title>
    <link rel="icon" type="image/png" href="https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafkreid5pvme3qwvxxxpfiip4nkh2rm7dzmfdynrrr264gsmkbbtha7cum">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* The Header/Banner Image */
        .header-banner {
            width: 100%;
            height: 200px;
            background-image: url('https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafybeieoycvpzvpm5d3ratvcuchqiswaf5v5o4txs5m22zyhkaoor2gnve');
            background-size: cover;
            background-position: center;
            background-color: #111111;
        }

        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
        }

        /* Profile pic overlap */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #000000;
            margin-top: -60px;
            margin-bottom: 15px;
            background-color: #000;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        p {
            color: #888888;
            font-size: 0.9rem;
            margin: 0 0 30px 0;
            line-height: 1.4;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 35px;
        }

        .link-card {
            background: #111111;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #222222;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background: #222222;
            border-color: #444444;
            transform: translateY(-2px);
        }

        /* Plain text handles styling */
        .handles-text {
            color: #888888;
            font-size: 0.85rem;
            line-height: 1.8;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="profile-container">
        <img class="profile-pic" src="https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafkreid5pvme3qwvxxxpfiip4nkh2rm7dzmfdynrrr264gsmkbbtha7cum" alt="Profile Picture">
        
        <h1>Cade Cain</h1>
        <p>Dog dad. Snake dad. Verbal minimalist.<br>Trader of traditional and digital assets.</p>

        <div class="links-container">
            <a href="mailto:info@cadecain.com" class="link-card">Email Me</a>
            <a href="https://x.com/0xCadey" target="_blank" class="link-card">Twitter / X</a>
            <a href="https://twitch.tv/cadecain" target="_blank" class="link-card">Twitch</a>
            <a href="https://opensea.io/cadecain" target="_blank" class="link-card">OpenSea</a>
        </div>

        <!-- Plain text handles section at the very bottom -->
        <div class="handles-text">
            @cadecain.eth | farcaster  Ξ  @cadecain.com | bluesky<br>
            cade@cadecain.com | nostr  Ξ  @cadecain | lens
        </div>
    </div>

</body>
</html>
