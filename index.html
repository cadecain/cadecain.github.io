<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadecain.eth</title>
    <link rel="icon" type="image/png" href="https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafkreid5pvme3qwvxxxpfiip4nkh2rm7dzmfdynrrr264gsmkbbtha7cum">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* The Header/Banner Image */
        .header-banner {
            width: 100%;
            height: 200px;
            background-image: url('https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafybeieoycvpzvpm5d3ratvcuchqiswaf5v5o4txs5m22zyhkaoor2gnve');
            background-size: cover;
            background-position: center;
            background-color: #111111;
        }

        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 0 20px 0px 20px; /* Reduced bottom padding */
            box-sizing: border-box;
        }

        /* Profile pic overlap */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #000000;
            margin-top: -60px;
            margin-bottom: 15px;
            background-color: #000;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        p {
            color: #888888;
            font-size: 0.9rem;
            margin: 0 0 30px 0;
            line-height: 1.4;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 35px;
        }

        .link-card {
            background: #111111;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #222222;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background: #222222;
            border-color: #444444;
            transform: translateY(-2px);
        }

        /* Plain text handles styling */
        .handles-text {
            color: #888888;
            font-size: 0.85rem;
            line-height: 1.8;
            font-weight: 400;
            margin-bottom: 10px; /* Tightened space below handles text */
        }

        /* Footer styling for the flag */
        .footer-flag {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 40px; /* Kept space at the absolute bottom of the screen */
        }

        .flag-img {
            width: 20px; /* Half the original size (was 40px) */
            height: auto;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .flag-img:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="profile-container">
        <img class="profile-pic" src="https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafkreid5pvme3qwvxxxpfiip4nkh2rm7dzmfdynrrr264gsmkbbtha7cum" alt="Profile Picture">
        
        <h1>Cade Cain</h1>
        <p>Southern roots. Rocky mountain views.</p>

        <div class="links-container">
            <a href="https://x.com/0xCadey" target="_blank" class="link-card">TwiX</a>
            <a href="https://opensea.io/cadecain" target="_blank" class="link-card">OpenSea</a>
            <a href="https://goodreads.com/cadecain" target="_blank" class="link-card">GoodReads</a>
        </div>

        <div class="handles-text">
           @cadecain.eth | farcaster<br>@cade@cadecain.com | nostr<br>@cadecain | lens protocol
        </div>
    </div>

    <footer class="footer-flag">
        <img class="flag-img" src="https://maroon-fast-dolphin-938.mypinata.cloud/ipfs/bafkreied3733oaybxa5honqxgv52az5phlmnbtcfa37xlgc4v6ichpqn7q" alt="Canada Flag">
    </footer>

</body>
</html>
